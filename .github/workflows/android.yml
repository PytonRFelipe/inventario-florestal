name: Compilar APK Android
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev libsqlite3-dev autoconf automake libtool pkg-config zlib1g-dev unzip zip gawk patch libncurses5

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Buildozer e Dependências
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy

      - name: Compilar com Buildozer
        run: buildozer android debug
          
      - name: Guardar o APK Gerado
        uses: actions/upload-artifact@v4
        with:
          name: Aplicativo-Instalador
          path: bin/*.apk
