name: Compilar APK Android
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev build-essential ccache git libffi-dev libssl-dev python3-dev
          
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36 kivy

      - name: Compilar com Buildozer
        run: |
          buildozer android debug
          
      - name: Guardar o APK Gerado
        uses: actions/upload-artifact@v3
        with:
          name: Aplicativo-Instalador
          path: bin/*.apk
