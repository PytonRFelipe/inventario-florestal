name: Compilar APK Android
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Dependências do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev python3-dev libsqlite3-dev autoconf automake libtool pkg-config zlib1g-dev unzip gawk

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36 kivy

      - name: Compilar com Buildozer
        run: |
          buildozer android debug
          
      - name: Guardar o APK Gerado
        uses: actions/upload-artifact@v4
        with:
          name: Aplicativo-Instalador
          path: bin/*.apk
